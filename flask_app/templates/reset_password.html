{% extends "base.html" %}
{% block title %}WealthWise — Reset Password{% endblock %}

{% block content %}
<h2>Reset Password for {{ user.username }}</h2>
<form method="POST">
    <label for="new_password">New Password:</label><br>
    <input type="password" id="new_password" name="new_password" required><br><br>
    
    <label for="confirm_password">Confirm New Password:</label><br>
    <input type="password" id="confirm_password" name="confirm_password" required><br><br>
    
    <input type="submit" value="Reset Password">
</form>

<div class="back-button-container" style="margin-top: 1rem;">
    <a href="{{ url_for('admin.manage_user', user_id=user.id) }}" class="back-button">← Cancel</a>
</div>
{% endblock %}
