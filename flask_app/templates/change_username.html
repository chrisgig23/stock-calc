{% extends "base.html" %}
{% block title %}WealthWise — Change Username{% endblock %}

{% block content %}
    <h2>Change Username</h2>

    <form method="POST" action="{{ url_for('admin.change_username') }}">
        <label for="new_username">New Username:</label>
        <input type="text" id="new_username" name="new_username" required>

        <br><br>
        <button type="submit" class="btn-primary">Save</button>
        <a href="{{ url_for('accounts.view_account') }}" class="btn-ghost">Back</a>
    </form>
{% endblock %}
